<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Vision AI</title>
    <style>
      body { background-color: #050505; color: white; margin: 0; padding: 0; min-height: 100vh; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.log("Vision AI Error:", msg, "at", url, ":", line);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force unregister all service workers to prevent stale cache issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
