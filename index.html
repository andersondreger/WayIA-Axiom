<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXIOM PRIME | O Futuro da Execução Multimercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        body { background-color: #050505; color: #fff; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .stars-bg { position: absolute; inset: 0; background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)); background-size: 200px 200px; opacity: 0.1; z-index: -1; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-axiom { background: linear-gradient(135deg, #ff8a00, #ff5500); transition: all 0.3s ease; }
        .btn-axiom:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 107, 0, 0.4); }
        /* Garante que o SVG não bloqueie cliques */
        svg { pointer-events: none; }
    </style>
</head>
<body class="h-screen flex items-center justify-center relative">
    <div class="stars-bg"></div>

    <div class="absolute inset-0 z-0 flex items-center justify-center">
        <svg class="w-full h-full opacity-40" viewBox="0 0 1920 1080">
            <g stroke="#ff6b00" fill="none" stroke-width="1">
                <ellipse cx="960" cy="540" rx="800" ry="400" opacity="0.1" />
                <ellipse cx="960" cy="540" rx="600" ry="300" opacity="0.2" />
                <ellipse cx="960" cy="540" rx="300" ry="150" opacity="0.4" />
            </g>
        </svg>
    </div>

    <main class="relative z-50 text-center px-6">
        <h1 class="text-4xl md:text-6xl font-bold mb-6 tracking-tighter">
            Revolucionando o <br>
            <span class="text-orange-500 font-light">{</span> Futuro das Finanças <span class="text-orange-500 font-light">}</span>
        </h1>
        <p class="text-gray-400 max-w-xl mx-auto mb-12">Analises em tempo real e execução blindada em uma plataforma de elite.</p>

        <button onclick="iniciarAcesso()" class="group relative inline-flex flex-col items-center">
            <span class="text-[10px] tracking-[0.3em] text-orange-500 mb-4 font-bold uppercase">Acessar Terminal</span>
            <div class="w-24 h-24 rounded-full border border-orange-500/50 flex items-center justify-center relative bg-black/50 btn-axiom">
                <div class="w-4 h-4 border-2 border-white rounded-full border-t-transparent animate-spin group-hover:animate-none"></div>
            </div>
        </button>
    </main>

    <div id="modal-cadastro" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 p-4">
        <div class="glass max-w-md w-full p-8 rounded-3xl text-center">
            <h2 class="text-2xl font-bold mb-2">Quase lá!</h2>
            <p class="text-gray-400 text-sm mb-6">Complete seu perfil para liberar o Axiom Dashboard.</p>
            
            <div class="space-y-4">
                <input type="text" id="reg-nome" placeholder="Seu Nome Completo" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none">
                <input type="email" id="reg-email" placeholder="E-mail" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none">
                <input type="text" id="reg-tel" placeholder="Telefone / WhatsApp" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none">
                
                <button onclick="finalizarCadastro()" class="w-full p-4 btn-axiom rounded-xl font-bold uppercase tracking-widest">
                    Salvar e Entrar
                </button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://xzlotpwqpdjwzqerdyfb.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // 1. Função que decide se abre Modal ou Dashboard
        async function iniciarAcesso() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                // Se não tem sessão, inicia login com Google
                await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.origin + '/index.html' }
                });
            } else {
                // Se já está logado, verifica se tem perfil na tabela gestao_usuarios
                const { data: perfil } = await supabase
                    .table('gestao_usuarios')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .single();

                if (perfil) {
                    window.location.href = "dashboard.html";
                } else {
                    // Se logou mas não preencheu dados, abre o modal
                    document.getElementById('modal-cadastro').classList.remove('hidden');
                    document.getElementById('reg-email').value = session.user.email;
                }
            }
        }

        // 2. Salva os dados no Supabase e redireciona
        async function finalizarCadastro() {
            const nome = document.getElementById('reg-nome').value;
            const tel = document.getElementById('reg-tel').value;
            const email = document.getElementById('reg-email').value;
            
            const { data: { session } } = await supabase.auth.getSession();

            if (nome && tel && session) {
                const { error } = await supabase.table('gestao_usuarios').insert([
                    { 
                        user_id: session.user.id, 
                        nome_cliente: nome, 
                        email: email, 
                        telefone: tel 
                    }
                ]);

                if (!error) {
                    window.location.href = "dashboard.html";
                } else {
                    alert("Erro ao salvar: " + error.message);
                }
            } else {
                alert("Por favor, preencha todos os campos.");
            }
        }

        // Auto-check ao carregar a página
        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Verifica se já tem perfil para pular a Landing
                const { data } = await supabase.table('gestao_usuarios').select('id').eq('user_id', session.user.id).single();
                if (data) window.location.href = "dashboard.html";
            }
        };
    </script>
</body>
</html>
