<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Prime | Trading Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .signal-card {
            border-left: 4px solid #222;
            transition: 0.4s ease;
        }

        .call-card {
            border-left-color: #22c55e;
            box-shadow: -10px 0 30px rgba(34, 197, 94, 0.1);
        }

        .put-card {
            border-left-color: #ef4444;
            box-shadow: -10px 0 30px rgba(239, 68, 68, 0.1);
        }

        .split-view {
            height: calc(100vh - 72px);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="screen-landing" class="min-h-screen flex flex-col items-center justify-center relative p-6">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_#1a0505_0%,_#000_70%)]"></div>
        <div class="relative z-10 text-center space-y-8 animate-in fade-in duration-700">
            <h1 class="text-7xl font-black tracking-tighter text-red-600">AXIOM <span
                    class="text-white font-light">PRIME</span></h1>
            <p class="text-zinc-500 max-w-sm mx-auto uppercase tracking-[0.3em] text-[10px] font-bold">Revolucionando o
                Futuro das Finanças</p>

            <button onclick="fazerLogin()"
                class="glass px-12 py-5 rounded-full font-black text-xs tracking-widest hover:bg-white hover:text-black transition-all duration-500 transform hover:scale-105 flex items-center gap-3 mx-auto">
                <img src="https://www.google.com/favicon.ico" class="w-4"> COMEÇAR AGORA
            </button>
        </div>
    </div>

    <div id="screen-dashboard" class="hidden flex flex-col min-h-screen">
        <nav
            class="h-[72px] border-b border-zinc-900 flex items-center justify-between px-10 bg-black/80 backdrop-blur-md">
            <div class="flex items-center gap-6">
                <span class="text-2xl font-black text-red-600">AXIOM</span>
                <div
                    class="text-[9px] font-bold text-green-500 bg-green-500/10 px-3 py-1 rounded-full uppercase tracking-widest">
                    Motor VPS Ativo</div>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-[9px] text-zinc-500 font-bold uppercase">Status da Conta</p>
                    <p id="user-display" class="text-white text-xs font-bold italic">Validando...</p>
                </div>
                <button onclick="fazerLogout()"
                    class="text-zinc-600 hover:text-red-500 transition text-xs font-bold">SAIR</button>
            </div>
        </nav>

        <div class="flex split-view">
            <div class="flex-1 border-r border-zinc-900">
                <iframe src="https://app.deriv.com/dtrader" 
                        id="deriv-frame"
                        class="w-full h-full border-none opacity-90" 
                        sandbox="allow-forms text-zinc-400 allow-scripts allow-same-origin allow-popups"
                        allow="geolocation; microphone; camera">
                </iframe>
            </div>
            <div class="w-[400px] bg-zinc-950 overflow-y-auto p-4 space-y-4" id="signal-feed">
                <div id="waiting-msg"
                    class="h-full flex items-center justify-center text-zinc-800 text-[10px] font-bold uppercase">
                    Aguardando sinais da VPS...</div>
            </div>
        </div>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        
        const axiom = window.supabase.createClient(sbUrl, sbKey);

        async function fazerLogin() {
            // Se o botão não estiver disparando, o console vai nos avisar agora
            console.log("Tentando abrir o portal Google...");
            const { error } = await axiom.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { 
                    redirectTo: 'https://axiom.wayia.com.br' 
                } 
            });
            if (error) alert("Erro Axiom: " + error.message);
        }

        async function fazerLogout() {
            await axiom.auth.signOut();
            window.location.reload();
        }

        // BLOQUEIO DE SEGURANÇA: Se a Deriv tentar roubar a URL, o site volta
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }

        axiom.auth.onAuthStateChange((event, session) => {
            const landing = document.getElementById('screen-landing');
            const dash = document.getElementById('screen-dashboard');

            if (session) {
                console.log("Acesso autorizado para:", session.user.email);
                landing.classList.add('hidden');
                dash.classList.remove('hidden');
                
                // Exibição do e-mail do usuário no dashboard
                const userDisplay = document.getElementById('user-display');
                if (userDisplay && session.user && session.user.email) {
                    userDisplay.innerText = session.user.email;
                }
                
                ligarMotorSinais();
            } else {
                landing.classList.remove('hidden');
                dash.classList.add('hidden');
            }
        });

        function ligarMotorSinais() {
            axiom.channel('custom-all-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => {
                const waiting = document.getElementById('waiting-msg');
                if (waiting) waiting.remove();
                
                const s = payload.new;
                const cardClass = s.direcao === 'CALL' ? 'call-card' : 'put-card';
                const textClass = s.direcao === 'CALL' ? 'text-green-500' : 'text-red-500';
                
                const cardHtml = `
                    <div class="signal-card glass p-6 rounded-xl ${cardClass} animate-pulse">
                        <div class="flex justify-between text-[9px] text-zinc-600 mb-2 font-bold uppercase">
                            <span>VOLATILITY 75</span>
                            <span>${new Date().toLocaleTimeString()}</span>
                        </div>
                        <h4 class="text-4xl font-black ${textClass}">${s.direcao}</h4>
                        <button class="w-full mt-4 py-3 bg-white text-black text-[10px] font-black rounded uppercase">Replicar</button>
                    </div>`;
                document.getElementById('signal-feed').insertAdjacentHTML('afterbegin', cardHtml);
            }).subscribe();
        }
    </script>
</body>

</html>
