<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Prime | Auditoria & Trading WayIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Efeito de Scanner Laser no Título */
        .scan-text {
            background: linear-gradient(90deg, #fff, #ff0000, #fff);
            background-size: 80% 100%;
            background-repeat: no-repeat;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: scanText 4s linear infinite;
        }

        @keyframes scanText {
            from {
                background-position: -500%;
            }

            to {
                background-position: 500%;
            }
        }

        /* Brilho Neon no Botão */
        .btn-axiom {
            position: relative;
            transition: 0.5s;
        }

        .btn-axiom:hover {
            box-shadow: 0 0 20px #ff0000;
            background: #ff0000;
            color: white;
        }

        .btn-axiom::after {
            content: '';
            position: absolute;
            inset: 0;
            background: #ff0000;
            blur: 10px;
            opacity: 0;
            transition: 0.5s;
            border-radius: 999px;
            z-index: -1;
        }

        .btn-axiom:hover::after {
            opacity: 0.5;
        }
    </style>
</head>

<body class="hero-bg min-h-screen flex flex-col items-center justify-center p-6 relative">

    <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_center,_#1a0505_0%,_#000_70%)] opacity-80 pointer-events-none">
    </div>

    <div class="relative z-10 text-center space-y-12 animate-in fade-in duration-1000">

        <div class="inline-block relative">
            <div class="absolute -inset-10 bg-red-600/10 blur-3xl rounded-full"></div>
            <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/logos/logoatu-removebg-preview.png"
                alt="Axiom Logo" class="w-48 mx-auto drop-shadow-lg relative z-10">
        </div>

        <div class="space-y-4 max-w-4xl mx-auto">
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase leading-none scan-text">
                AUDITORIA <span class="text-white">WAYIA</span>
            </h1>
            <p class="text-zinc-600 max-w-lg mx-auto text-[9px] md:text-xs font-bold uppercase tracking-[0.6em]">
                Explore o Futuro das Finanças Digitais com Segurança
            </p>
        </div>

        <div class="pt-10">
            <a href="https://axiom.wayia.com.br/login"
                class="btn-axiom glass inline-flex items-center gap-4 px-16 py-6 rounded-full font-black text-xs tracking-widest uppercase text-zinc-300 hover:text-white transition-all">
                <img src="https://www.google.com/favicon.ico" alt="Google Favicon" class="w-5 h-5">
                ESTABELECER CONEXÃO SEGURA
            </a>
            <p class="mt-8 text-[8px] text-zinc-700 uppercase tracking-widest font-bold">Domínio Oficial Dreger |
                Powered by WayIA</p>
        </div>

    </div>

    <footer class="absolute bottom-6 left-6 flex items-center gap-4 text-zinc-700 text-xs">
        <span class="font-bold uppercase tracking-widest text-[9px]">SIGA-NOS</span>
        <div class="flex gap-2">
            <span class="p-2 border border-zinc-900 rounded-full">IG</span>
            <span class="p-2 border border-zinc-900 rounded-full">X</span>
        </div>
    </footer>

</body>

</html>
