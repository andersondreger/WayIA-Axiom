<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayIA Axiom | Engenharia de Soberania</title>
    <style>
        :root {
            --primary: #FF6D00; /* Laranja Neon Axiom */
            --bg: #0e0e10;
            --surface: #15171a;
            --text-main: #ffffff;
            --text-dim: #999999;
            --border: rgba(255, 109, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Background Dinâmico */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden;
        }
        .video-container video {
            min-width: 100%; min-height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.12);
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(14, 14, 16, 0.8) 0%, var(--bg) 100%);
            z-index: -1;
        }

        header {
            padding: 10px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(21, 23, 26, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 109, 0, 0.2); position: sticky; top: 0; z-index: 1000;
        }
        .logo-img { height: 60px; filter: drop-shadow(0 0 10px var(--primary)); }
        .btn-login {
            background: rgba(255, 109, 0, 0.05); color: var(--primary); border: 1px solid var(--primary);
            padding: 10px 24px; border-radius: 4px; font-size: 12px; font-weight: 700;
            text-transform: uppercase; text-decoration: none; transition: 0.3s;
        }
        .btn-login:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        /* Hero Layout */
        .hero-container {
            display: grid; grid-template-columns: 1fr 1fr; align-items: center;
            min-height: 80vh; padding: 0 10%; max-width: 1400px; margin: 0 auto; gap: 40px;
        }
        .hero-text span { color: var(--primary); font-size: 0.8rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .hero-text h1 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; line-height: 1.1; margin-bottom: 25px; text-transform: uppercase; }
        .hero-text p { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 40px; line-height: 1.6; }
        
        .btn-box { display: flex; gap: 20px; }
        .btn { padding: 14px 30px; font-weight: 700; font-size: 13px; text-transform: uppercase; text-decoration: none; border-radius: 4px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 5px 20px rgba(255, 109, 0, 0.3); }
        .btn-secondary { border: 1px solid var(--primary); color: var(--primary); background: rgba(255, 109, 0, 0.05); }

        /* Avatar Axiom com Animação de Respiração */
        .avatar-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        .avatar-wrapper { position: relative; width: 100%; max-width: 500px; }
        .avatar-img { 
            width: 100%; 
            filter: drop-shadow(0 0 10px rgba(255, 109, 0, 0.1)); 
            transition: all 0.5s ease;
            animation: breathing 4s ease-in-out infinite;
        }

        @keyframes breathing {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2) drop-shadow(0 0 15px var(--primary)); }
        }

        .speaking { animation: speaking-vibe 0.2s ease-in-out infinite !important; }
        @keyframes speaking-vibe {
            0% { transform: scale(1.02) rotate(0.5deg); }
            100% { transform: scale(1.02) rotate(-0.5deg); }
        }

        .voice-status { margin-top: 20px; font-size: 10px; letter-spacing: 3px; color: var(--primary); text-transform: uppercase; font-weight: 700; }

        /* Features */
        .features { padding: 100px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .f-card { padding: 40px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 8px; transition: 0.4s; }
        .f-card:hover { border-color: var(--primary); background: rgba(255, 109, 0, 0.03); transform: translateY(-10px); }
        
        footer { padding: 60px; text-align: center; color: var(--text-dim); font-size: 10px; letter-spacing: 4px; border-top: 1px solid var(--border); opacity: 0.6; }
    </style>
</head>

<body>
    <div class="video-container">
        <video autoplay loop muted playsinline><source src="large-thumbnail20240821-2596943-heqw9s.mp4" type="video/mp4"></video>
    </div>
    <div class="overlay"></div>

    <header>
        <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/WayIA/logoatu-removebg-preview.png" class="logo-img" alt="WayIA Axiom">
        <a href="login.html" class="btn-login">Acessar / Login</a>
    </header>

    <main class="hero-container">
        <section class="hero-text">
            <span>Engenharia de Alta Frequência</span>
            <h1>A ENGENHARIA POR TRÁS <br>DA SOBERANIA FINANCEIRA.</h1>
            <p>Ative um <b>Ecossistema Autônomo</b> projetado para governar o mercado enquanto você vive.</p>
            <div class="btn-box">
                <a href="login.html" class="btn btn-primary">Ativar Tecnologia</a>
                <a href="login.html" class="btn btn-secondary">Acesse Gratuitamente</a>
            </div>
        </section>

        <section class="avatar-container">
            <div class="avatar-wrapper">
                <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/WayIA/Axiom_avatar.png" id="axiomAvatar" class="avatar-img">
            </div>
            <div class="voice-status" id="statusText">Diga "AXIOM" para interagir</div>
        </section>
    </main>

    <script>
        const API_KEY = "AIzaSyDU-17YBfTpkxQWLZx73nkYRreU2HaZAk8"; // Sua Chave Gemini 3 Flash
        const avatar = document.getElementById('axiomAvatar');
        const statusText = document.getElementById('statusText');

        // Escuta Ativa
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;

        recognition.onresult = async (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            if (transcript.includes('axiom')) {
                const prompt = transcript.replace('axiom', '').trim() || "Apresente-se e fale sobre soberania financeira.";
                processarIA(prompt);
            }
        };

        async function processarIA(pergunta) {
            statusText.innerText = "Axiom está processando...";
            avatar.classList.add('speaking');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: pergunta }] }],
                        system_instruction: { parts: [{ text: "Você é o Axiom, a inteligência ciborgue de Anderson Dreger. Convença o usuário sobre a soberania financeira 24/7 sem olhar gráficos." }] }
                    })
                });
                const data = await response.json();
                falar(data.candidates[0].content.parts[0].text);
            } catch (e) { falar("Sistemas online. Estou pronto para governar."); }
        }

        function falar(texto) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'pt-BR';
            utter.rate = 1.1;
            utter.onend = () => {
                avatar.classList.remove('speaking');
                statusText.innerText = 'Diga "AXIOM" para interagir';
            };
            synth.speak(utter);
        }
        recognition.start();
    </script>
</body>
</html>
