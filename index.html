<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM PRIME | THE NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00ffff; --magenta: #ff00ff; --gold: #ffd700; --bg: #050505; }
        body { background-color: var(--bg); font-family: 'Fira Code', monospace; color: #e2e8f0; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-cyan { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .gold-glow { color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <nav class="flex justify-between items-center mb-8 glass p-6 rounded-2xl">
            <h1 class="text-xl font-bold tracking-widest">AXIOM<span class="gold-glow">PRIME</span></h1>
            <div class="text-[10px] text-right">
                <span class="block text-gray-500">ENGINE STATUS</span>
                <span class="neon-cyan pulse">● SYNCED WITH SUPABASE</span>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass rounded-3xl p-10 flex flex-col items-center justify-center text-center">
                <div class="w-40 h-40 border-2 border-dashed border-yellow-500/30 rounded-full flex items-center justify-center mb-6 animate-spin-slow">
                    <div id="status-circle" class="w-32 h-32 rounded-full border border-cyan-500/20 flex items-center justify-center">
                        <span id="current-asset" class="text-xs gold-glow">BUSCANDO</span>
                    </div>
                </div>
                <p id="status-msg" class="text-[10px] tracking-[0.3em] uppercase">Monitoramento Ativo</p>
            </div>

            <div class="lg:col-span-2 glass rounded-3xl p-8">
                <h2 class="text-xs mb-6 text-gray-500 tracking-widest uppercase">The Nexus Live Feed</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs">
                        <thead>
                            <tr class="text-gray-600 border-b border-gray-800 text-left">
                                <th class="pb-4">HORA</th>
                                <th class="pb-4">ATIVO</th>
                                <th class="pb-4">AÇÃO</th>
                                <th class="pb-4">CONF.</th>
                                <th class="pb-4 text-right">STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="signal-rows">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://xzlotpwqpdjwzqerdyfb.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadSignals() {
            const { data } = await supabase.from('live_signals').select('*').order('created_at', { ascending: false }).limit(6);
            if (data) {
                document.getElementById('current-asset').innerText = data[0]?.par || "BUSCANDO";
                document.getElementById('signal-rows').innerHTML = data.map(s => `
                    <tr class="border-b border-gray-900/50 hover:bg-white/5 transition">
                        <td class="py-4 text-gray-500">${new Date(s.created_at).toLocaleTimeString('pt-BR')}</td>
                        <td class="py-4 font-bold neon-cyan">${s.par}</td>
                        <td class="py-4 ${s.acao.includes('COMPRAR') ? 'text-green-400' : 'text-red-400'}">${s.acao}</td>
                        <td class="py-4">${s.confianca}</td>
                        <td class="py-4 text-right gold-glow font-bold italic">${s.status}</td>
                    </tr>
                `).join('');
            }
        }
        setInterval(loadSignals, 2000);
        loadSignals();
    </script>
</body>
</html>
