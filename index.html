<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayIA Axiom | Executive Auditor & Trading</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --axiom-blue: #00D1FF; --axiom-red: #FF0032; --axiom-green: #00FF85; }
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .hidden { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-bg { background: radial-gradient(circle at center, #1a0505 0%, #000 75%); }
        .split-height { height: calc(100vh - 80px); }
        
        /* Laser Scanner Effect */
        .scanner-line { 
            height: 2px; background: linear-gradient(90deg, transparent, var(--axiom-blue), transparent);
            width: 100%; position: absolute; top: 0; z-index: 10;
            animation: scan 4s linear infinite; box-shadow: 0 0 15px var(--axiom-blue);
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* Progress Bar Custom */
        .progress-glow { box-shadow: 0 0 10px var(--axiom-blue); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="screen-landing" class="min-h-screen flex flex-col items-center justify-center relative hero-bg p-6 text-center">
        <div class="absolute inset-0 opacity-20" style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');"></div>
        
        <div class="relative z-10 space-y-10 animate-in fade-in duration-1000">
            <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/logos/logoatu-removebg-preview.png" class="w-40 mx-auto drop-shadow-[0_0_20px_rgba(255,0,0,0.3)]">
            
            <div class="space-y-4">
                <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase">WayIA <span class="text-zinc-500">Axiom</span></h1>
                <p class="text-[10px] text-zinc-500 tracking-[0.6em] font-bold uppercase">Auditoria de Ativos & Governança Algorítmica</p>
            </div>

            <button onclick="loginGoogle()" class="glass px-16 py-6 rounded-full font-black text-[10px] tracking-widest hover:bg-white hover:text-black transition-all duration-700 transform hover:scale-110 border border-zinc-800">
                INICIAR CONEXÃO SEGURA
            </button>
        </div>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="h-20 border-b border-zinc-900 flex items-center justify-between px-8 bg-black/60 backdrop-blur-xl z-50">
            <div class="flex items-center gap-6">
                <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/logos/logoatu-removebg-preview.png" class="h-8">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Auditor Mode</span>
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[9px] font-bold text-green-500 uppercase">VPS V3 Connected</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-10">
                <div class="flex gap-8">
                    <div class="text-right">
                        <p class="text-[8px] text-zinc-600 font-black uppercase">Capital sob Gestão</p>
                        <p id="user-balance" class="text-white font-mono font-bold text-sm tracking-tighter">$ --.--</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 border-l border-zinc-800 pl-8">
                    <span id="user-name" class="text-[10px] font-bold text-zinc-400"></span>
                    <button onclick="logout()" class="p-2 hover:text-red-500 transition">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
            </div>
        </nav>

        <main class="flex flex-1 split-height overflow-hidden">
            <div class="flex-1 bg-black relative">
                <div class="scanner-line"></div>
                <iframe id="deriv-frame" src="https://app.deriv.com/dtrader" class="w-full h-full border-none opacity-80 shadow-2xl shadow-blue-500/10"></iframe>
            </div>

            <div class="w-[420px] bg-[#080808] border-l border-zinc-900 flex flex-col">
                <div class="p-6 border-b border-zinc-900 bg-zinc-900/10">
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em]">Módulo de Auditoria UX</h3>
                </div>

                <div id="signal-feed" class="flex-1 overflow-y-auto p-5 space-y-5">
                    <div class="glass p-5 rounded-2xl border border-zinc-800/50 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-zinc-500 uppercase">Integridade WayIA</span>
                            <span class="text-[9px] text-blue-400 font-bold">100%</span>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[8px] uppercase text-zinc-600 font-bold">
                                <span>Latência de Rede</span>
                                <span>12ms</span>
                            </div>
                            <div class="h-1 w-full bg-zinc-900 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 progress-glow" style="width: 95%"></div>
                            </div>
                        </div>
                        <ul class="text-[8px] space-y-1.5 text-zinc-500 font-bold uppercase tracking-wider">
                            <li class="flex items-center gap-2"><svg class="text-green-500" width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg> Conexão WebSocket Segura</li>
                            <li class="flex items-center gap-2"><svg class="text-green-500" width="10" height="10" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg> Auditoria de Volume Ativa</li>
                        </ul>
                    </div>

                    <div id="no-signal" class="h-64 flex flex-col items-center justify-center text-zinc-800 space-y-4 opacity-50">
                        <div class="relative">
                            <svg class="animate-spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                        </div>
                        <span class="text-[8px] font-black uppercase tracking-[0.3em]">Escaneando Volatility 75 Index...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        
        const axiom = window.supabase.createClient(sbUrl, sbKey);

        async function loginGoogle() {
            await axiom.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://axiom.wayia.com.br' } });
        }

        async function logout() {
            await axiom.auth.signOut();
            window.location.reload();
        }

        axiom.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('screen-landing').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                document.getElementById('user-name').innerText = session.user.user_metadata.full_name || session.user.email;
                fetchBalance(session.user.id);
                startAxiomEngine();
            }
        });

        function startAxiomEngine() {
            axiom.channel('axiom-live')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => {
                const empty = document.getElementById('no-signal');
                if (empty) empty.classList.add('hidden');
                
                const s = payload.new;
                const typeColor = s.direcao === 'CALL' ? 'text-[#00FF85]' : 'text-[#FF0032]';
                const borderColor = s.direcao === 'CALL' ? 'border-[#00FF85]' : 'border-[#FF0032]';
                const bgGlow = s.direcao === 'CALL' ? 'rgba(0, 255, 133, 0.05)' : 'rgba(255, 0, 50, 0.05)';
                
                const card = `
                    <div class="glass p-6 rounded-3xl border-l-4 ${borderColor} animate-in slide-in-from-right duration-500" style="background: ${bgGlow}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black text-zinc-600 uppercase tracking-widest">Asset: Volatility 75</span>
                            <span class="text-[9px] text-zinc-700 font-mono">${new Date().toLocaleTimeString()}</span>
                        </div>
                        <h4 class="text-5xl font-black ${typeColor} tracking-tighter italic">${s.direcao}</h4>
                        <div class="mt-6 space-y-3">
                            <div class="flex justify-between text-[8px] font-black text-zinc-500 uppercase">
                                <span>Probabilidade de Assertividade</span>
                                <span class="${typeColor}">${(s.confianca * 100).toFixed(1)}%</span>
                            </div>
                            <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden">
                                <div class="h-full ${s.direcao === 'CALL' ? 'bg-[#00FF85]' : 'bg-[#FF0032]'} shadow-[0_0_10px_currentColor]" style="width: ${s.confianca * 100}%"></div>
                            </div>
                        </div>
                        <div class="mt-6 p-3 rounded-xl bg-black/40 border border-zinc-800">
                             <p class="text-[8px] text-zinc-500 leading-relaxed font-bold uppercase tracking-tighter text-center">
                                Veredito: Auditoria confirmou força de movimento. Execute ordem na Deriv.
                             </p>
                        </div>
                        <button class="w-full mt-4 py-4 bg-white text-black text-[10px] font-black rounded-2xl hover:scale-95 transition-all uppercase tracking-widest">Executar Operação</button>
                    </div>`;
                document.getElementById('signal-feed').insertAdjacentHTML('afterbegin', card);
            }).subscribe();
        }

        async function fetchBalance(uid) {
            const { data } = await axiom.table('gestao_usuarios').select('saldo_deriv').eq('user_id', uid).single();
            if (data) document.getElementById('user-balance').innerText = `$ ${data.saldo_deriv.toFixed(2)}`;
        }
    </script>
</body>
</html>
