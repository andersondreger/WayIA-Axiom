<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Prime | Intelligent Auditor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --axiom-cyan: #00D1FF;
            --axiom-red: #FF0032;
            --axiom-green: #00FF85;
        }

        body {
            background: #020202;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-bg {
            background: radial-gradient(circle at center, #1a0505 0%, #000 80%);
        }

        /* Scanner Animado */
        .scan-bar {
            height: 2px;
            background: var(--axiom-cyan);
            width: 100%;
            position: absolute;
            top: 0;
            z-index: 20;
            animation: scan 6s linear infinite;
            box-shadow: 0 0 15px var(--axiom-cyan);
            opacity: 0.4;
        }

        @keyframes scan {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        /* Widgets de Auditoria */
        .widget-border {
            border-left: 3px solid var(--axiom-cyan);
            background: linear-gradient(90deg, rgba(0, 209, 255, 0.05) 0%, transparent 100%);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .split-view {
            height: calc(100vh - 80px);
        }
    </style>
</head>

<body>

    <div id="screen-landing"
        class="min-h-screen flex flex-col items-center justify-center relative hero-bg p-6 text-center">
        <div class="absolute inset-0 opacity-10"
            style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');"></div>

        <div class="relative z-10 space-y-10 animate-in fade-in duration-1000">
            <div class="flex flex-col items-center gap-2">
                <div class="w-24 h-24 bg-red-600/20 rounded-full blur-2xl absolute"></div>
                <h2 class="text-5xl font-black tracking-tighter relative z-10">AXIOM <span
                        class="text-zinc-500 font-light">PRIME</span></h2>
                <div class="h-[2px] w-20 bg-red-600"></div>
            </div>

            <div class="space-y-4">
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase leading-tight">
                    Auditoria de <br> <span class="text-red-600 italic">Alta Performance</span>
                </h1>
                <p
                    class="text-zinc-500 max-w-lg mx-auto text-[10px] tracking-[0.5em] font-bold uppercase leading-relaxed">
                    Sincronização Algorítmica com a Infraestrutura Deriv
                </p>
            </div>

            <button onclick="fazerLogin()"
                class="glass-panel px-14 py-5 rounded-none border-x-2 border-white/10 font-black text-[10px] tracking-widest hover:bg-white hover:text-black transition-all duration-500 transform hover:scale-105">
                ESTABELECER CONEXÃO SEGURA
            </button>
        </div>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col bg-[#16191D] p-4 md:p-8">
        <div class="flex-1 flex flex-col max-w-[1400px] w-full mx-auto bg-[#1C2025] rounded-xl shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden border border-[#2A2F35]">
            <!-- Header -->
            <nav class="h-20 border-b border-[#2A2F35] flex items-center justify-between px-8 bg-[#22272D]">
                <div class="flex items-center gap-4">
                    <div class="text-4xl text-gray-300">🏛️</div>
                    <div class="text-2xl font-black text-white tracking-tight">Axiom <span class="text-[#00FF85]">IA</span></div>
                </div>

                <div class="flex items-center gap-8 font-mono text-[13px] text-[#00FF85]">
                    <span class="cursor-pointer hover:text-white transition">[ Dashboard ]</span>
                    <span class="cursor-pointer hover:text-white transition">[ Sobre ]</span>
                    <span class="cursor-pointer hover:text-white transition">[ Contato ]</span>
                    <button onclick="fazerLogout()" class="text-red-400 hover:text-red-500 transition ml-4">[ Sair ]</button>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="flex flex-1 p-8 gap-8">
                <!-- Left Chart Panel -->
                <div class="flex-1 flex flex-col gap-5">
                    <!-- Toggles -->
                    <div class="flex justify-between items-center">
                        <div class="flex gap-3">
                            <button class="px-6 py-2.5 border border-[#2A2F35] rounded-lg text-sm font-bold text-zinc-400 bg-[#16191D] hover:bg-zinc-800 transition">BTC/USD</button>
                            <button class="px-6 py-2.5 border border-[#2A2F35] rounded-lg text-sm font-bold text-zinc-400 bg-[#16191D] hover:bg-zinc-800 transition">SOL/USD</button>
                            <button class="px-6 py-2.5 border border-[#00FF85] rounded-lg text-sm font-bold text-[#00FF85] bg-[#00FF85]/10">NEAR/USD</button>
                        </div>
                        <div class="flex gap-3">
                            <button class="px-5 py-2.5 border border-[#00FF85] rounded-lg text-sm font-bold text-[#00FF85] bg-[#00FF85]/10">M1</button>
                            <button class="px-5 py-2.5 border border-[#2A2F35] rounded-lg text-sm font-bold text-zinc-400 bg-[#16191D] hover:bg-zinc-800 transition">M5</button>
                            <button class="px-5 py-2.5 border border-[#2A2F35] rounded-lg text-sm font-bold text-zinc-400 bg-[#16191D] hover:bg-zinc-800 transition">M15</button>
                        </div>
                    </div>

                    <!-- Iframe Wrapper -->
                    <div class="flex-1 rounded-xl overflow-hidden border border-[#2A2F35] bg-[#16191D] relative min-h-[500px] flex p-4">
                        <div class="w-full h-full rounded-lg overflow-hidden relative">
                            <div class="scan-bar"></div>
                            <iframe id="deriv-frame" src="https://app.deriv.com/dtrader" class="w-full h-full border-none" sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
                        </div>
                    </div>
                </div>

                <!-- Right Side Panel -->
                <div class="w-[380px] flex flex-col">
                    <!-- Glowing Container -->
                    <div class="flex-1 bg-[#1C2025] rounded-xl p-6 flex flex-col relative"
                         style="border: 2px solid #00FF85; box-shadow: 0 0 35px rgba(0, 255, 133, 0.15);">
                        
                        <h3 class="text-sm font-bold text-white flex items-center justify-center gap-2 mb-8 mt-2">
                            📊 ANÁLISE EM TEMPO REAL
                        </h3>

                        <button onclick="simularSinal()" class="w-full py-4 bg-[#00FF85] text-[#16191D] rounded-xl font-black uppercase text-[13px] mb-8 shadow-[0_0_20px_rgba(0,255,133,0.4)] hover:bg-[#00e575] hover:scale-[1.02] transition-all">
                            [ CONECTAR E ANALISAR AGORA ]
                        </button>

                        <div id="signal-feed" class="flex-1 overflow-y-auto w-full">
                            <!-- Empty State -->
                            <div id="no-signal" class="h-40 flex flex-col items-center justify-center text-zinc-500 space-y-4">
                                <svg class="animate-spin text-[#00FF85]" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                                </svg>
                                <span class="text-xs font-bold uppercase tracking-widest text-zinc-400">Sincronizando...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="py-5 text-center text-[11px] text-zinc-500 font-medium tracking-wide">
                © 2026 Axiom IA by WayIA. Todos os direitos reservados. | <a href="#" class="underline hover:text-white transition">Termos de Uso</a>
            </footer>
        </div>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        const axiom = window.supabase.createClient(sbUrl, sbKey);

        async function fazerLogin() {
            await axiom.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://axiom.wayia.com.br' } });
        }

        async function fazerLogout() {
            await axiom.auth.signOut();
            window.location.reload();
        }

        axiom.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('screen-landing').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                fetchBalance(session.user.id);
                initAxiomEngine();
            }
        });

        const ativosDeriv = {
            'R_75': 'https://app.deriv.com/dtrader?symbol=R_75',
            'R_100': 'https://app.deriv.com/dtrader?symbol=R_100',
            '1HZ10V': 'https://app.deriv.com/dtrader?symbol=1HZ10V',
            'R_10': 'https://app.deriv.com/dtrader?symbol=R_10'
        };

        function renderSinal(sinal) {
            const empty = document.getElementById('no-signal');
            if (empty) empty.classList.add('hidden');

            const frame = document.getElementById('deriv-frame');

            // --- LÓGICA DE SINCRONIZAÇÃO DO GRÁFICO ---
            if (sinal.ativo && ativosDeriv[sinal.ativo]) {
                console.log(`Sincronizando gráfico com: ${sinal.ativo}`);
                frame.src = ativosDeriv[sinal.ativo];
            }

            const isCall = sinal.direcao === 'CALL';
            const color = isCall ? 'text-[#00FF85]' : 'text-[#FF4444]';
            const direcaoTexto = isCall ? 'CALL (Compra)' : 'PUT (Venda)';
            const entradaMock = sinal.entrada || (Math.random() * (1.30000 - 1.20000) + 1.20000).toFixed(5);
            const nomeAtivo = sinal.ativo || 'VOLATILITY 75 INDEX';

            const card = `
                <div class="space-y-3 animate-in fade-in slide-in-from-top-4 duration-500">
                    <div class="flex justify-between text-[10px] font-black text-zinc-500 mb-2 uppercase tracking-widest px-1">
                        <span>${nomeAtivo}</span>
                        <span>${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="bg-[#23272D] border border-[#2A2F35] rounded-xl p-4 flex text-[13px] font-bold items-center shadow-lg">
                        <span class="w-8 text-lg">👁️</span> <span class="text-zinc-500">VEREDITO:</span> <span class="ml-auto ${color} uppercase tracking-wide">${direcaoTexto}</span>
                    </div>
                    <div class="bg-[#23272D] border border-[#2A2F35] rounded-xl p-4 flex text-[13px] font-bold items-center shadow-lg">
                        <span class="w-8 text-lg">🎯</span> <span class="text-zinc-500">CONFIANÇA:</span> <span class="ml-auto text-white tracking-wide">${(sinal.confianca * 100).toFixed(0)}%</span>
                    </div>
                    <div class="bg-[#23272D] border border-[#2A2F35] rounded-xl p-4 flex text-[13px] font-bold items-center shadow-lg">
                        <span class="w-8 text-lg">💸</span> <span class="text-zinc-500">ENTRADA:</span> <span class="ml-auto text-white tracking-wide">${entradaMock}</span>
                    </div>
                    
                    <div class="bg-[#23272D] border border-[#2A2F35] rounded-xl p-5 text-sm text-zinc-400 leading-relaxed mt-5 shadow-lg">
                        <div class="flex gap-2 font-bold text-white mb-2 text-xs uppercase tracking-widest"><span class="w-5">📝</span> JUSTIFICATIVA TÉCNICA 1:</div>
                        Sinais algorítmicos alinhados com fluxo de volume indicativo de pressão ${isCall ? 'compradora' : 'vendedora'} no curto prazo.
                    </div>
                    <div class="bg-[#23272D] border border-[#2A2F35] rounded-xl p-5 text-sm text-zinc-400 leading-relaxed shadow-lg mb-2">
                        <div class="flex gap-2 font-bold text-white mb-2 text-xs uppercase tracking-widest"><span class="w-5">📝</span> JUSTIFICATIVA TÉCNICA 2:</div>
                        Métricas de volatilidade no modelo cruzado fortalecem a decisão estratégica atual mantendo margem segura de erro.
                    </div>
                    
                    <button onclick="window.open('${frame.src}', '_blank')" class="w-full mt-4 py-4 bg-[#2A2F35] text-white rounded-xl font-black uppercase text-xs hover:bg-zinc-700 transition border border-zinc-600 shadow-lg">
                        ABRIR OPERAÇÃO NO TERMINAL
                    </button>
                </div>`;
            document.getElementById('signal-feed').innerHTML = card;
        }

        function initAxiomEngine() {
            console.log("Motor de Sincronização Ativado...");
            
            // Ouvir em todas as possíveis variações de nomes de canais já usados para garantir que nenhum seja perdido
            axiom.channel('sinais').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => renderSinal(payload.new)).subscribe();
            axiom.channel('live-axiom').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => renderSinal(payload.new)).subscribe();
            axiom.channel('axiom-live').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => renderSinal(payload.new)).subscribe();
        }

        // Simulação instantânea conectada ao botão verde principal
        function simularSinal() {
            const mock = {
                ativo: ['R_75', 'R_100', '1HZ10V', 'R_10'][Math.floor(Math.random()*4)],
                direcao: Math.random() > 0.5 ? 'CALL' : 'PUT',
                confianca: (Math.random() * (0.99 - 0.70) + 0.70)
            };
            renderSinal(mock);
        }

        async function fetchBalance(uid) {
            const { data } = await axiom.table('gestao_usuarios').select('saldo_deriv').eq('user_id', uid).single();
            if (data) document.getElementById('user-balance').innerText = `$ ${data.saldo_deriv.toFixed(2)}`;
        }
    </script>
</body>

</html>
