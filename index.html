<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Prime | WayIA Governance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-bg {
            background: radial-gradient(circle at center, #1a0505 0%, #000 75%);
        }

        .scan-line {
            height: 1px;
            background: #ff0000;
            width: 100%;
            position: absolute;
            top: 0;
            z-index: 10;
            animation: scan 4s linear infinite;
            opacity: 0.2;
        }

        @keyframes scan {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="screen-landing"
        class="min-h-screen flex flex-col items-center justify-center relative hero-bg p-6 text-center">
        <div class="relative z-10 space-y-12 animate-in fade-in duration-700">
            <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/logos/logoatu-removebg-preview.png"
                alt="Axiom Logo" class="w-48 mx-auto drop-shadow-2xl">

            <div class="space-y-4">
                <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase leading-none">
                    AUDITORIA <span class="text-zinc-600 italic">WAYIA</span>
                </h1>
                <p class="text-[9px] text-zinc-500 tracking-[0.5em] font-bold uppercase">ALGORITHMIC GOVERNANCE &
                    FINANCIAL SECURITY</p>
            </div>

            <button onclick="fazerLogin()"
                class="glass px-12 py-5 rounded-full font-black text-[10px] tracking-widest hover:bg-white hover:text-black transition-all flex items-center gap-3 mx-auto border border-zinc-800">
                <img src="https://www.google.com/favicon.ico" class="w-4"> ESTABELECER CONEXÃO SEGURA
            </button>

            <p class="text-[8px] text-zinc-700 uppercase font-bold tracking-widest">PROCURADORIA OFICIAL DREGER |
                POWERED BY WAYIA</p>
        </div>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="h-20 border-b border-zinc-900 flex items-center justify-between px-10 bg-black/50 backdrop-blur-md">
            <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/logos/logoatu-removebg-preview.png"
                class="h-8">
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-[8px] text-zinc-500 font-bold uppercase">Banca Auditoria</p>
                    <p id="user-balance" class="text-white font-mono font-bold">$ 0.00</p>
                </div>
                <button onclick="fazerLogout()"
                    class="text-[10px] font-black border border-zinc-800 px-4 py-2 rounded hover:bg-red-600 transition">SAIR</button>
            </div>
        </nav>

        <div class="flex flex-1 overflow-hidden">
            <div class="flex-1 bg-black relative">
                <div class="scan-line"></div>
                <iframe src="https://app.deriv.com/dtrader" class="w-full h-full border-none opacity-90"
                    sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>
            </div>
            <div id="signal-feed" class="w-96 bg-zinc-950 border-l border-zinc-900 p-4 overflow-y-auto space-y-4">
                <div id="no-signal"
                    class="h-40 flex items-center justify-center text-zinc-800 text-[10px] font-bold uppercase italic text-center">
                    Escaneando ativos em tempo real...</div>
            </div>
        </div>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        const axiom = window.supabase.createClient(sbUrl, sbKey);

        async function fazerLogin() {
            await axiom.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://axiom.wayia.com.br' }
            });
        }

        async function fazerLogout() {
            await axiom.auth.signOut();
            window.location.reload();
        }

        // ESSA É A PARTE QUE FAZ O SITE MUDAR DE TELA
        axiom.auth.onAuthStateChange((event, session) => {
            if (session) {
                console.log("Logado com sucesso!");
                document.getElementById('screen-landing').classList.add('hidden');
                document.getElementById('screen-dashboard').classList.remove('hidden');
                ligarMotorSinais();
            }
        });

        function ligarMotorSinais() {
            axiom.channel('sinais').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => {
                const empty = document.getElementById('no-signal');
                if (empty) empty.classList.add('hidden');
                const s = payload.new;
                const card = `
                    <div class="glass p-6 rounded-2xl border-l-4 ${s.direcao === 'CALL' ? 'border-green-600' : 'border-red-600'} animate-in slide-in-from-right">
                        <h4 class="text-4xl font-black ${s.direcao === 'CALL' ? 'text-green-500' : 'text-red-500'}">${s.direcao}</h4>
                        <p class="text-[10px] text-zinc-500 mt-2 font-bold uppercase">Confiança: ${(s.confianca * 100).toFixed(0)}%</p>
                        <button class="w-full mt-4 py-3 bg-white text-black text-[10px] font-black rounded-lg uppercase">Replicar Agora</button>
                    </div>`;
                document.getElementById('signal-feed').insertAdjacentHTML('afterbegin', card);
            }).subscribe();
        }
    </script>
</body>

</html>
