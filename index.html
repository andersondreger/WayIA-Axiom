<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayIA Axiom | Engenharia de Soberania</title>
    <style>
        :root {
            --primary: #00E5FF;
            /* Azul Axiom */
            --accent: #FF6D00;
            /* Laranja Neon Comercial */
            --bg: #0e0e10;
            --surface: #15171a;
            --text-main: #ffffff;
            --text-dim: #999999;
            --success: #00ff88;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Background */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-container video {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.12);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(14, 14, 16, 0.8) 0%, var(--bg) 100%);
            z-index: -1;
        }

        header {
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(21, 23, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-img {
            height: 60px;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .btn-login {
            background: rgba(0, 229, 255, 0.05);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-login:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        /* Hero Split Layout */
        .hero-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            min-height: 85vh;
            padding: 0 10%;
            max-width: 1400px;
            margin: 0 auto;
            gap: 40px;
        }

        .hero-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Substituído para Engenharia de Alta Frequência */
        .hero-text span {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Headline Fragmentada */
        .hero-text h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-box {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 14px 30px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.3);
        }

        /* Botão Laranja Neon Comercial */
        .btn-secondary {
            border: 1px solid var(--accent);
            color: var(--accent);
            background: rgba(255, 109, 0, 0.05);
            box-shadow: 0 0 10px rgba(255, 109, 0, 0.1);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        .avatar-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-placeholder {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
        }

        @media (max-width: 968px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .btn-box {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="large-thumbnail20240821-2596943-heqw9s.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <header>
        <div class="logo-box">
            <img src="https://xzlotpwqpdjwzqerdyfb.supabase.co/storage/v1/object/public/WayIA/logoatu-removebg-preview.png"
                class="logo-img" alt="WayIA Axiom">
        </div>
        <div class="status-box">
            <a href="login.html" class="btn-login">Acessar / Login</a>
        </div>
    </header>

    <main class="hero-container">
        <section class="hero-text">
            <span>Engenharia de Alta Frequência</span>
            <h1>A ENGENHARIA POR TRÁS <br>DA SOBERANIA FINANCEIRA.</h1>
            <p>Pare de seguir sinais. Ative um <b>Ecossistema Autônomo</b> institucional projetado para governar o
                mercado enquanto você vive.</p>

            <div class="btn-box">
                <a href="login.html" class="btn btn-primary">Ativar Tecnologia</a>
                <a href="login.html" class="btn btn-secondary">Acesse Gratuitamente</a>
            </div>
        </section>

        <section class="avatar-container">
            <div class="avatar-placeholder">
                <!-- Espaço nobre reservado para o seu Avatar IA -->
            </div>
        </section>
    </main>

</body>

</html>
