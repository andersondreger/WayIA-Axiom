<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayIA - Axiom Sentinel Dashboard</title>
    <!-- Tailwind CSS para design de elite -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cliente Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid #1f1f1f;
            backdrop-filter: blur(10px);
        }

        .win-glow {
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .loss-glow {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <!-- HEADER SOBERANO -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Axiom Sentinel <span
                    class="text-blue-600">v22.0</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest font-bold">Ecossistema WayIA - Engenharia de
                Produção</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge"
                class="bg-blue-900/20 text-blue-500 px-4 py-1 rounded-full text-[10px] border border-blue-500/30 uppercase font-bold animate-pulse">
                Monitorando Turno: Ativo
            </div>
            <button onclick="testarVoz()" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg transition-all">
                🔊
            </button>
        </div>
    </header>

    <!-- CARDS DE PERFORMANCE -->
    <main class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="glass-card p-6 rounded-2xl">
            <p class="text-gray-500 text-xs uppercase font-bold mb-1">Lucro Acumulado</p>
            <h2 id="lucro-total" class="text-3xl font-black text-white">$ 0.00</h2>
        </div>
        <div class="glass-card p-6 rounded-2xl border-l-4 border-l-blue-600">
            <p class="text-gray-500 text-xs uppercase font-bold mb-1">Taxa de Assertividade</p>
            <h2 id="win-rate" class="text-3xl font-black text-white">0%</h2>
        </div>
        <div class="glass-card p-6 rounded-2xl">
            <p class="text-gray-500 text-xs uppercase font-bold mb-1">Operações (Total)</p>
            <h2 id="total-trades" class="text-3xl font-black text-white">0</h2>
        </div>
    </main>

    <!-- TABELA DE LOGS EM TEMPO REAL -->
    <section class="glass-card rounded-2xl overflow-hidden">
        <div class="p-6 border-b border-gray-800 flex justify-between items-center">
            <h3 class="text-sm font-bold uppercase tracking-widest text-gray-300">Logs de Operação em Tempo Real</h3>
            <span class="text-[10px] bg-gray-800 px-2 py-1 rounded text-gray-400">SERVER: VPS-MATELANDIA</span>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="text-[10px] uppercase text-gray-500 bg-black/50">
                    <tr>
                        <th class="px-6 py-4">Horário</th>
                        <th class="px-6 py-4">Ativo</th>
                        <th class="px-6 py-4 text-center">Resultado</th>
                        <th class="px-6 py-4">Lucro</th>
                        <th class="px-6 py-4">Métricas</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo" class="text-sm divide-y divide-gray-800">
                    <!-- Trades inseridos via JavaScript -->
                </tbody>
            </table>
        </div>
    </section>

    <!-- LÓGICA DE INTELIGÊNCIA -->
    <script>
        // CONFIGURAÇÕES SUPABASE (Suas Chaves)
        const _URL = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTczMTk4MTkwNn0.InJlZ2li6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTczMTk4MTkwNn0';
        const supabase = window.supabase.createClient(_URL, _KEY);

        // FUNÇÃO DE VOZ DO ECOSSISTEMA
        function falar(texto) {
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(texto);
            utterThis.lang = 'pt-BR';
            utterThis.rate = 1.1;
            synth.speak(utterThis);
        }

        function testarVoz() { falar("Sistema de voz Axiom Sentinel ativado."); }

        // BUSCAR DADOS INICIAIS
        async function renderizarDashboard() {
            const { data: trades, error } = await supabase
                .from('trade_history')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return console.error("Erro Supabase:", error);

            // Cálculos
            const total = trades.length;
            const wins = trades.filter(t => t.resultado === 'WIN').length;
            const lucroTotal = trades.reduce((acc, t) => acc + t.valor, 0);
            const winRate = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;

            // Update UI
            document.getElementById('lucro-total').innerText = `$ ${lucroTotal.toFixed(2)}`;
            document.getElementById('win-rate').innerText = `${winRate}%`;
            document.getElementById('total-trades').innerText = total;

            // Render Tabela
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';
            trades.slice(0, 12).forEach(t => {
                const dataHora = new Date(t.created_at).toLocaleTimeString('pt-BR');
                const isWin = t.resultado === 'WIN';
                corpo.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition-colors">
                        <td class="px-6 py-4 text-gray-500 font-mono text-xs">${dataHora}</td>
                        <td class="px-6 py-4 font-bold text-white">${t.ativo}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black ${isWin ? 'bg-green-900/20 text-green-500 border border-green-500/30' : 'bg-red-900/20 text-red-500 border border-red-500/30'}">
                                ${t.resultado}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-mono ${isWin ? 'text-green-500' : 'text-red-500'}">
                            ${isWin ? '+' : ''}${t.valor.toFixed(2)}
                        </td>
                        <td class="px-6 py-4 text-[10px] text-gray-500 uppercase">
                            ADX: <span class="text-blue-400">${t.adx}</span> | COICE: <span class="text-blue-400">${t.coice}</span>
                        </td>
                    </tr>
                `;
            });
        }

        // REALTIME SUBSCRIPTION (Ouvir o Axiom na VPS)
        supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trade_history' }, (payload) => {
                const novoTrade = payload.new;
                renderizarDashboard();
                falar(`Axiom Sentinel informa: Novo ${novoTrade.resultado} no ativo ${novoTrade.ativo}.`);
            })
            .subscribe();

        // Início
        window.onload = renderizarDashboard;
    </script>
</body>

</html>
