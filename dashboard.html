<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM SENTINEL | Wedding Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #050E1D;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="antialiased h-screen flex flex-col">
    <nav class="h-20 border-b border-cyan-400/10 flex items-center justify-between px-8 bg-navy-900/80">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 border-2 border-cyan-400 rounded-full flex items-center justify-center glow-text">A
            </div>
            <span class="text-xl font-black text-white glow-text uppercase">Axiom <span
                    class="text-cyan-400">Sentinel</span></span>
        </div>
        <div class="flex gap-4">
            <button onclick="document.getElementById('onboarding-modal').classList.remove('hidden')"
                class="px-4 py-2 bg-navy-700 text-cyan-400 text-[10px] font-bold border border-cyan-400/30 rounded-lg uppercase">Parâmetros</button>
            <button onclick="logout()" class="text-zinc-500 text-[10px] font-bold uppercase">Sair</button>
        </div>
    </nav>

    <main class="flex-1 p-6 grid grid-cols-12 gap-6 overflow-hidden">
        <div class="col-span-3 flex flex-col gap-6">
            <div class="glass p-6 rounded-2xl text-center border-cyan-400/20 shadow-2xl">
                <h3 class="text-cyan-400 text-[10px] font-black uppercase mb-4">ADX Alvo</h3>
                <div id="val-adx" class="text-6xl font-black text-white glow-text">--</div>
            </div>
            <div class="glass p-6 rounded-2xl flex-1 flex flex-col overflow-hidden border-cyan-400/20">
                <h3 class="text-cyan-400 text-[10px] font-black uppercase mb-4 border-b border-cyan-400/10 pb-2">
                    Telemetria</h3>
                <div id="live-feed-content"
                    class="flex-1 overflow-y-auto space-y-2 font-mono text-[9px] text-cyan-400/70"></div>
            </div>
        </div>

        <div class="col-span-6 glass rounded-2xl relative overflow-hidden shadow-2xl">
            <div id="scanner-view" class="absolute inset-0 flex flex-col items-center justify-center bg-[#030a13] z-10">
                <div class="w-16 h-16 border-2 border-t-cyan-400 border-transparent rounded-full animate-spin mb-4">
                </div>
                <h4 class="text-cyan-400 font-mono text-[10px] animate-pulse">VARRENDO MERCADO...</h4>
            </div>
            <iframe id="market-chart" class="absolute inset-0 w-full h-full border-none hidden z-20" src=""></iframe>
        </div>

        <div class="col-span-3 flex flex-col glass rounded-2xl shadow-2xl border-purple-500/20">
            <div class="p-6 bg-purple-500/10 border-b border-purple-500/20 text-center">
                <h3 class="text-purple-400 text-[10px] font-black uppercase mb-2">Banca Deriv</h3>
                <div id="lucro-acumulado" class="text-4xl font-black text-white">$0.00</div>
                <div id="lucro-dia" class="text-[12px] font-black text-neon uppercase mt-2">$0.00 (HOJE)</div>
            </div>
            <div id="trade-history-table" class="flex-1 p-4 overflow-y-auto space-y-2"></div>
        </div>
    </main>

    <div id="onboarding-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
        <div class="glass p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-black text-white mb-6 text-center">AJUSTE AXIOM</h2>
            <div class="space-y-4">
                <input type="text" id="token-input" placeholder="Token Deriv"
                    class="w-full bg-navy-900 border border-cyan-400/30 text-white p-3 rounded-xl outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="adx-input" step="0.1" value="27.0"
                        class="bg-navy-900 border border-cyan-400/30 text-white p-3 rounded-xl outline-none">
                    <input type="number" id="stake-input" value="10.0"
                        class="bg-navy-900 border border-cyan-400/30 text-white p-3 rounded-xl outline-none">
                </div>
                <button onclick="sincronizar()"
                    class="w-full bg-cyan-500 text-navy-900 font-black py-4 rounded-xl">SALVAR E INICIAR</button>
            </div>
        </div>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        const axiom = window.supabase.createClient(sbUrl, sbKey);
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await axiom.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUser = session.user;
            await loadData();
            initRealtime();
        });

        async function loadData() {
            const { data: config } = await axiom.from('user_configs').select('*').eq('user_id', currentUser.id).single();
            if (config) {
                document.getElementById('val-adx').innerText = config.adx_minimo;
                document.getElementById('lucro-acumulado').innerText = `$${config.saldo_atual.toFixed(2)}`;
                document.getElementById('lucro-dia').innerText = `$${config.lucro_dia.toFixed(2)} (HOJE)`;
            }
            const { data: logs } = await axiom.from('trade_logs').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(5);
            if (logs) logs.forEach(log => addHistory(log));
        }

        async function sincronizar() {
            const token = document.getElementById('token-input').value;
            const adx = parseFloat(document.getElementById('adx-input').value);
            const stake = parseFloat(document.getElementById('stake-input').value);
            await axiom.from('user_configs').upsert({ user_id: currentUser.id, token_deriv: token, adx_minimo: adx, stake: stake }, { onConflict: 'user_id' });
            location.reload();
        }

        function initRealtime() {
            // Trades e Gráfico
            axiom.channel('trades').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trade_logs' }, (p) => {
                const t = p.new;
                if (t.status === 'OPEN') {
                    document.getElementById('scanner-view').classList.add('hidden');
                    document.getElementById('market-chart').classList.remove('hidden');
                    document.getElementById('market-chart').src = `https://tradingview.binary.com?symbol=${t.symbol}`;
                } else if (t.status === 'CLOSED') {
                    setTimeout(() => { document.getElementById('scanner-view').classList.remove('hidden'); document.getElementById('market-chart').classList.add('hidden'); }, 5000);
                    addHistory(t);
                }
            }).subscribe();

            // Saldo
            axiom.channel('balance').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'user_configs' }, (p) => {
                document.getElementById('lucro-acumulado').innerText = `$${p.new.saldo_atual.toFixed(2)}`;
                document.getElementById('lucro-dia').innerText = `$${p.new.lucro_dia.toFixed(2)} (HOJE)`;
            }).subscribe();
        }

        function addHistory(t) {
            const list = document.getElementById('trade-history-table');
            if (list.children.length >= 5) list.lastElementChild.remove();
            const isWin = t.profit >= 0;
            const div = document.createElement('div');
            div.className = `glass p-3 rounded-xl border ${isWin ? 'border-neon/30' : 'border-red-500/30'} cursor-pointer animate-fade`;
            div.innerHTML = `<div class="flex justify-between items-center"><div class="flex flex-col"><span class="text-[10px] text-zinc-400">${t.symbol}</span><span class="${isWin ? 'text-neon' : 'text-red-400'} text-[11px] font-black">${isWin ? 'WIN' : 'LOSS'}</span></div><span class="text-xl font-black">${isWin ? '+' : ''}$${t.profit.toFixed(2)}</span></div>`;
            div.onclick = () => { document.getElementById('scanner-view').classList.add('hidden'); document.getElementById('market-chart').classList.remove('hidden'); document.getElementById('market-chart').src = `https://tradingview.binary.com?symbol=${t.symbol}`; };
            list.prepend(div);
        }

        function logout() { axiom.auth.signOut(); window.location.href = 'login.html'; }
    </script>
</body>

</html>
