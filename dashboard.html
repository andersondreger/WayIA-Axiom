<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Prime | Ecossistema de Trading de Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-red { box-shadow: 0 0 30px rgba(229, 9, 20, 0.2); }
        .signal-card { border-left: 4px solid #222; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .call-card { border-left-color: #22c55e; box-shadow: -10px 0 30px rgba(34, 197, 94, 0.1); }
        .put-card { border-left-color: #ef4444; box-shadow: -10px 0 30px rgba(239, 68, 68, 0.1); }
        .split-view { height: calc(100vh - 72px); }
        @keyframes pulse-live { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .live-dot { animation: pulse-live 2s infinite; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    
    <nav class="h-[72px] border-b border-zinc-900 flex items-center justify-between px-10 bg-black/80 backdrop-blur-md z-20">
        <div class="flex items-center gap-6">
            <span class="text-2xl font-black text-red-600 tracking-tighter">AXIOM</span>
            <div class="h-4 w-[px] bg-zinc-800"></div>
            <div class="flex items-center gap-2 text-[9px] font-bold text-green-500 bg-green-500/10 px-3 py-1 rounded-full">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full live-dot"></span> VPS V3 ONLINE
            </div>
        </div>

        <div class="flex items-center gap-8">
            <div class="text-right border-r border-zinc-800 pr-8">
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Saldo Banca Deriv</p>
                <p id="user-balance" class="text-white font-mono font-bold text-lg">$ 0.00</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="user-email" class="text-[10px] font-medium text-zinc-400">agente@quantum.com</p>
                </div>
                <button onclick="logout()" class="p-2 text-zinc-600 hover:text-red-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 split-view">
        
        <div class="flex-1 bg-black border-r border-zinc-900 relative">
            <iframe src="https://app.deriv.com/dtrader" class="w-full h-full border-none opacity-90"></iframe>
            <div id="loading-deriv" class="absolute inset-0 bg-black flex items-center justify-center pointer-events-none opacity-0 transition-opacity">
                <span class="text-zinc-800 text-[10px] font-bold tracking-widest animate-pulse">CARREGANDO DERIV...</span>
            </div>
        </div>

        <div class="w-[420px] bg-zinc-950 flex flex-col">
            <div class="p-6 border-b border-zinc-900 bg-black/20">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">Oportunidades em Tempo Real</h3>
            </div>
            
            <div id="signal-feed" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div id="waiting-msg" class="h-full flex flex-col items-center justify-center text-zinc-800 space-y-3">
                    <svg class="animate-spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Aguardando Mercado...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE INTEGRADAS (ANDERSON)
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        const supabase = window.supabase.createClient(sbUrl, sbKey);

        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            document.getElementById('user-email').innerText = currentUser.email;
            
            initAxiomEngine();
            updateBalance(currentUser.id);
        });

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // MOTOR DE SINAIS REALTIME
        function initAxiomEngine() {
            const feed = document.getElementById('signal-feed');
            
            supabase.channel('public:sinais_axiom')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sinais_axiom' }, payload => {
                    document.getElementById('waiting-msg').classList.add('hidden');
                    const sinal = payload.new;
                    
                    const cardClass = sinal.direcao === 'CALL' ? 'call-card' : 'put-card';
                    const textClass = sinal.direcao === 'CALL' ? 'text-green-500' : 'text-red-500';
                    const glowClass = sinal.direcao === 'CALL' ? 'bg-green-500' : 'bg-red-500';
                    
                    const html = \`
                        <div class="signal-card glass p-6 rounded-2xl \${cardClass} animate-in slide-in-from-right duration-500">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black text-zinc-600 tracking-widest uppercase">Volatility 75 (1M)</span>
                                <span class="text-[9px] text-zinc-700 font-mono">\${new Date().toLocaleTimeString()}</span>
                            </div>
                            <h4 class="text-5xl font-black \${textClass} tracking-tighter">\${sinal.direcao}</h4>
                            <div class="mt-6">
                                <div class="flex justify-between text-[9px] mb-2 uppercase font-bold text-zinc-500">
                                    <span>Confiança Axiom</span>
                                    <span>\${(sinal.confianca * 100).toFixed(2)}%</span>
                                </div>
                                <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden">
                                    <div class="h-full \${glowClass} transition-all duration-1000" style="width: \${sinal.confianca * 100}%"></div>
                                </div>
                            </div>
                            <button onclick="replicarOperacao()" class="w-full mt-6 py-4 bg-white text-black text-[10px] font-black rounded-xl hover:bg-red-600 hover:text-white transition-all transform active:scale-95 uppercase tracking-widest">
                                Replicar na Banca
                            </button>
                        </div>
                    \`;
                    feed.insertAdjacentHTML('afterbegin', html);
                })
                .subscribe();
        }

        async function updateBalance(uid) {
            const { data } = await supabase.table('gestao_usuarios').select('saldo_deriv').eq('user_id', uid).single();
            if (data && data.saldo_deriv !== undefined) {
                document.getElementById('user-balance').innerText = \`$ \${data.saldo_deriv.toFixed(2)}\`;
            } else {
                document.getElementById('user-balance').innerText = "$ 0.00";
            }
        }

        function replicarOperacao() {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "ENVIADO PARA VPS...";
            btn.classList.add('bg-zinc-800', 'text-zinc-400');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-zinc-800', 'text-zinc-400');
            }, 2000);
        }
    </script>
</body>
</html>
