<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM SENTINEL | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Roboto Mono', 'monospace'] },
                    colors: {
                        navy: { 900: '#030a13', 800: '#0A192F', 700: '#112240', 600: '#233554' },
                        cyan: { glow: '#00b3cc', 400: '#00E5FF', 500: '#00bcd4' },
                        neon: '#00FFC2',
                        amber: '#FFC107'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #050E1D;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-y: auto;
        }

        .glass {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        .indicator-card {
            transition: all 0.3s;
        }

        .indicator-active {
            border-color: #00E5FF;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-fade-in-right {
            animation: fadeInRight 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="antialiased pb-10">

    <div id="onboarding-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div
            class="glass p-8 rounded-2xl w-full max-w-md border border-cyan-400/50 shadow-[0_0_40px_rgba(0,229,255,0.2)]">
            <h2 class="text-2xl font-black text-white mb-2 text-center">AJUSTE DE OPERAÇÃO</h2>
            <p class="text-[10px] text-cyan-400 text-center font-mono mb-6 uppercase tracking-widest">Sincronização com
                VPS Sentinel</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] text-cyan-400/70 font-semibold mb-1 uppercase tracking-widest">Token
                        API Deriv</label>
                    <input type="text" id="deriv-token-input"
                        class="w-full bg-navy-900 border border-cyan-400/30 text-white text-sm font-mono px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-400 transition"
                        placeholder="Token de Negociação">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[10px] text-cyan-400/70 font-semibold mb-1 uppercase tracking-widest">ADX
                            Mínimo</label>
                        <input type="number" id="adx-input" step="0.1" value="35.0"
                            class="w-full bg-navy-900 border border-cyan-400/30 text-white text-sm font-mono px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-400 transition">
                    </div>
                    <div>
                        <label
                            class="block text-[10px] text-cyan-400/70 font-semibold mb-1 uppercase tracking-widest">Stake
                            (USD)</label>
                        <input type="number" id="stake-input" value="10.0"
                            class="w-full bg-navy-900 border border-cyan-400/30 text-white text-sm font-mono px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-400 transition">
                    </div>
                </div>

                <button onclick="sincronizarComMotor()" id="btn-save-token"
                    class="w-full bg-cyan-500 hover:bg-cyan-400 text-navy-900 font-black text-sm uppercase tracking-widest py-3 rounded-xl shadow-[0_0_15px_rgba(0,229,255,0.3)] transition-all">
                    Sincronizar com Motor
                </button>
                <div id="token-error" class="hidden text-xs text-amber-400 font-mono text-center mt-2"></div>
            </div>
        </div>
    </div>

    <div class="min-h-screen flex flex-col">
        <nav
            class="h-20 border-b border-cyan-400/10 flex items-center justify-between px-8 bg-navy-900/80 backdrop-blur-xl">
            <div class="flex items-center gap-4">
                <div
                    class="w-10 h-10 border border-cyan-400 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(0,229,255,0.3)]">
                    <span class="text-cyan-400 font-black">A</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tight text-white glow-text">AXIOM <span
                            class="text-cyan-400">SENTINEL</span></span>
                    <span class="text-[9px] font-bold text-neon uppercase tracking-widest">Sincronia Cognitiva
                        Ativa</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('onboarding-modal').classList.remove('hidden')"
                    class="px-4 py-2 bg-navy-700 text-cyan-400 text-[10px] font-bold border border-cyan-400/30 rounded-lg hover:bg-cyan-400/10 transition">
                    AJUSTAR ESTRATÉGIA
                </button>
                <button onclick="logout()" class="text-zinc-500 hover:text-red-400 transition">SAIR</button>
            </div>
        </nav>

        <main class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 lg:h-[calc(100vh-80px)]">
            <div class="lg:col-span-1 flex flex-col gap-6 h-full">
                <div class="glass p-6 rounded-2xl text-center shrink-0 shadow-[0_0_30px_rgba(0,0,0,0.5)] border-cyan-400/20">
                    <h3 class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-4">Status do Motor</h3>
                    <div id="val-adx" class="text-6xl font-black text-white mb-2 glow-text">35.0</div>
                    <div class="text-xs font-mono text-zinc-500">ADX SNIPER ATUAL</div>
                </div>

                <div class="glass p-6 rounded-2xl flex-1 flex flex-col overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)] border-cyan-400/20">
                    <h3 class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-4 border-b border-cyan-400/20 pb-3">Registro de Sincronia (Live Feed)</h3>
                    <div id="live-feed-content" class="flex-1 overflow-y-auto space-y-3 font-mono text-xs pr-2">
                        <!-- Logs injectados em realtime -->
                        <div class="flex items-start gap-2 text-cyan-400 border-l-2 border-cyan-400 pl-2">
                            <span class="text-[9px] mt-0.5 opacity-50">SISTEMA</span>
                            <span>Analisando mercado...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="signal-feed" class="lg:col-span-2 glass rounded-2xl overflow-hidden relative shadow-[0_0_30px_rgba(0,0,0,0.5)] border-cyan-400/20 min-h-[400px]">
                <div id="scanner-view" class="absolute inset-0 flex flex-col items-center justify-center bg-[#030a13] z-10 transition-opacity duration-500">
                    <video autoplay loop muted class="absolute inset-0 w-full h-full object-cover mix-blend-screen opacity-40">
                        <source src="https://cdn.pixabay.com/video/2016/09/21/5325-183786445_tiny.mp4" type="video/mp4">
                    </video>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#030a13] to-transparent z-10"></div>
                    <div class="relative z-20 text-center">
                        <div class="w-24 h-24 border-4 border-t-cyan-400 border-r-transparent border-b-cyan-400 border-l-transparent rounded-full animate-spin mb-4 mx-auto opacity-80"></div>
                        <h4 class="text-cyan-400 font-mono text-[10px] sm:text-xs animate-pulse glow-text">PROCESSANDO DADOS EM ALTA FREQUÊNCIA...</h4>
                    </div>
                </div>

                <iframe id="market-chart" class="absolute inset-0 w-full h-full border-none hidden z-20" src=""></iframe>
                
                <div id="historico-resultados" class="absolute right-4 top-4 z-30 flex flex-col gap-2 pointer-events-none">
                    <!-- Cards de resultado aparecerão aqui -->
                </div>
            </div>
        </main>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        const axiom = window.supabase.createClient(sbUrl, sbKey);

        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await axiom.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUser = session.user;

            // Verificar se já tem configuração (corrigido mapeamento de ID)
            const { data } = await axiom.from('user_configs').select('*').eq('id', currentUser.id).single();
            if (!data || !data.deriv_token) {
                document.getElementById('onboarding-modal').classList.remove('hidden');
            } else {
                document.getElementById('val-adx').innerText = data.adx_minimo;
            }

            initRealtimeListener();
        });

        function addLiveFeedLog(message, isHighlight = false) {
            const feed = document.getElementById('live-feed-content');
            const log = document.createElement('div');
            const time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
            
            const colorClass = isHighlight ? 'text-neon border-neon' : 'text-cyan-400/70 border-cyan-400/30';
            
            log.className = `flex items-start gap-2 ${colorClass} border-l-2 pl-2 animate-fade-in-right`;
            log.innerHTML = `
                <span class="text-[9px] mt-0.5 opacity-50">${time}</span>
                <span>${message}</span>
            `;
            feed.prepend(log);
        }

        function showTradeOpen(symbol) {
            addLiveFeedLog(`Confirmando Inclinação ADX...`);
            addLiveFeedLog(`ORDEM EXECUTADA EM ${symbol}. Abrindo gráfico...`, true);

            const scanner = document.getElementById('scanner-view');
            const chart = document.getElementById('market-chart');
            scanner.classList.add('opacity-0');
            setTimeout(() => {
                scanner.classList.add('hidden');
                chart.src = `https://tradingview.binary.com?symbol=${symbol || 'R_100'}`;
                chart.classList.remove('hidden');
            }, 500);
        }

        function showTradeClosed(profit) {
            addLiveFeedLog(`Ordem encerrada. Status de retorno: $${profit.toFixed(2)}`, profit >= 0);

            const scanner = document.getElementById('scanner-view');
            const chart = document.getElementById('market-chart');
            chart.classList.add('hidden');
            chart.src = '';
            scanner.classList.remove('hidden');
            
            setTimeout(() => {
                scanner.classList.remove('opacity-0');
                showResultCard(profit);
            }, 50);
        }

        function showResultCard(profit) {
            const histo = document.getElementById('historico-resultados');
            const card = document.createElement('div');
            const isWin = profit >= 0;
            const color = isWin ? 'text-neon border-neon/30' : 'text-red-400 border-red-400/30';
            const bgColor = isWin ? 'bg-neon/10' : 'bg-red-400/10';
            
            card.className = `glass ${bgColor} border ${color} px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 animate-fade-in-right pointer-events-auto`;
            card.innerHTML = `
                <div class="font-black text-lg ${color}">${isWin ? '+' : ''}$${profit.toFixed(2)}</div>
                <div class="text-[9px] font-mono uppercase tracking-widest text-white/70">Ordem Fechada</div>
            `;
            
            histo.prepend(card);
            setTimeout(() => card.remove(), 10000);
        }

        function initRealtimeListener() {
            axiom.channel('axiom_motor_events')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'trade_logs', filter: `user_id=eq.${currentUser.id}` },
                    (payload) => {
                        const { status, symbol, profit } = payload.new;
                        if (status === 'ORDEM_ABERTA') {
                            showTradeOpen(symbol);
                        } else if (status === 'ORDEM_FECHADA') {
                            showTradeClosed(profit);
                        }
                    }
                )
                .subscribe();

            // Atalhos expostos no window para testes ou chamadas nativas do motor localmente
            window.triggerTradeOpen = showTradeOpen;
            window.triggerTradeClosed = showTradeClosed;
        }

        async function sincronizarComMotor() {
            const token = document.getElementById('deriv-token-input').value; // Mapeado do HTML existente
            const adx = parseFloat(document.getElementById('adx-input').value.replace(',', '.'));
            const stake = parseFloat(document.getElementById('stake-input').value.replace(',', '.')); // Mapeado localmente

            // CORREÇÃO DA COLUNA: Mapeando como 'id' e 'estaca'
            const { error } = await axiom.from('user_configs').upsert({ 
                id: currentUser.id, 
                deriv_token: token, 
                adx_minimo: adx,
                estaca: stake,
                updated_at: new Date()
            }, { onConflict: 'id' });

            if (error) {
                console.error(error);
                alert("Erro na Sincronia: " + error.message);
            } else {
                alert("Sincronizado com o Mármore! 🚀");
                document.getElementById('onboarding-modal').classList.add('hidden'); // Fecha modal
                document.getElementById('val-adx').innerText = adx;
                addLiveFeedLog(`Motor sincronizado. Sinal ADX ajustado para ${adx} e Estaca: $${stake}`);
            }
        }

        async function logout() {
            await axiom.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
