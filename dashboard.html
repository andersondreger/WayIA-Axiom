<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM SENTINEL | Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Roboto Mono', 'monospace'] },
                    colors: {
                        navy: { 900: '#030a13', 800: '#0A192F', 700: '#112240', 600: '#233554' },
                        cyan: { glow: '#00b3cc', 400: '#00E5FF', 500: '#00bcd4' },
                        neon: '#00FFC2',
                        amber: '#FFC107'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #050E1D;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-y: auto;
        }

        .glass {
            background: rgba(10, 25, 47, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        .indicator-card {
            transition: all 0.3s;
        }

        .indicator-active {
            border-color: #00E5FF;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }
    </style>
</head>

<body class="antialiased pb-10">

    <div id="onboarding-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div
            class="glass p-8 rounded-2xl w-full max-w-md border border-cyan-400/50 shadow-[0_0_40px_rgba(0,229,255,0.2)]">
            <h2 class="text-2xl font-black text-white mb-2 text-center">AJUSTE DE OPERAÇÃO</h2>
            <p class="text-[10px] text-cyan-400 text-center font-mono mb-6 uppercase tracking-widest">Sincronização com
                VPS Sentinel</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] text-cyan-400/70 font-semibold mb-1 uppercase tracking-widest">Token
                        API Deriv</label>
                    <input type="text" id="deriv-token-input"
                        class="w-full bg-navy-900 border border-cyan-400/30 text-white text-sm font-mono px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-400 transition"
                        placeholder="Token de Negociação">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label
                            class="block text-[10px] text-cyan-400/70 font-semibold mb-1 uppercase tracking-widest">ADX
                            Mínimo</label>
                        <input type="number" id="adx-input" step="0.1" value="38.0"
                            class="w-full bg-navy-900 border border-cyan-400/30 text-white text-sm font-mono px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-400 transition">
                    </div>
                    <div>
                        <label
                            class="block text-[10px] text-cyan-400/70 font-semibold mb-1 uppercase tracking-widest">Stake
                            (USD)</label>
                        <input type="number" id="stake-input" value="10.0"
                            class="w-full bg-navy-900 border border-cyan-400/30 text-white text-sm font-mono px-4 py-3 rounded-xl focus:outline-none focus:border-cyan-400 transition">
                    </div>
                </div>

                <button onclick="salvarConfiguracoes()" id="btn-save-token"
                    class="w-full bg-cyan-500 hover:bg-cyan-400 text-navy-900 font-black text-sm uppercase tracking-widest py-3 rounded-xl shadow-[0_0_15px_rgba(0,229,255,0.3)] transition-all">
                    Sincronizar com Motor
                </button>
                <div id="token-error" class="hidden text-xs text-amber-400 font-mono text-center mt-2"></div>
            </div>
        </div>
    </div>

    <div class="min-h-screen flex flex-col">
        <nav
            class="h-20 border-b border-cyan-400/10 flex items-center justify-between px-8 bg-navy-900/80 backdrop-blur-xl">
            <div class="flex items-center gap-4">
                <div
                    class="w-10 h-10 border border-cyan-400 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(0,229,255,0.3)]">
                    <span class="text-cyan-400 font-black">A</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black tracking-tight text-white glow-text">AXIOM <span
                            class="text-cyan-400">SENTINEL</span></span>
                    <span class="text-[9px] font-bold text-neon uppercase tracking-widest">Sincronia Cognitiva
                        Ativa</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('onboarding-modal').classList.remove('hidden')"
                    class="px-4 py-2 bg-navy-700 text-cyan-400 text-[10px] font-bold border border-cyan-400/30 rounded-lg hover:bg-cyan-400/10 transition">
                    AJUSTAR ESTRATÉGIA
                </button>
                <button onclick="logout()" class="text-zinc-500 hover:text-red-400 transition">SAIR</button>
            </div>
        </nav>

        <main class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-2xl text-center">
                <h3 class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-4">Status do Motor</h3>
                <div id="val-adx" class="text-6xl font-black text-white mb-2">38.0</div>
                <div class="text-xs font-mono text-zinc-500">ADX SNIPER ATUAL</div>
            </div>
            <div id="signal-feed" class="glass p-6 rounded-2xl min-h-[300px] space-y-4">
                <h3 class="text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-4 italic">Monitorando
                    Sinais...</h3>
                <p class="text-zinc-600 text-xs font-mono">Aguardando gatilho no mármore...</p>
            </div>
        </main>
    </div>

    <script>
        const sbUrl = 'https://xzlotpwqpdjwzqerdyfb.supabase.co';
        const sbKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6bG90cHdxcGRqd3pxZXJkeWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTcwMjEsImV4cCI6MjA4Nzg5MzAyMX0.a17_2kF4vBSRI84W7R-tAUl-D-ZXEey6BwEi3d2aMuU';
        const axiom = window.supabase.createClient(sbUrl, sbKey);

        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await axiom.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUser = session.user;

            // Verificar se já tem configuração
            const { data } = await axiom.from('user_configs').select('*').eq('id', currentUser.id).single();
            if (!data || !data.deriv_token) {
                document.getElementById('onboarding-modal').classList.remove('hidden');
            } else {
                document.getElementById('val-adx').innerText = data.adx_minimo;
            }
        });

        async function salvarConfiguracoes() {
            const token = document.getElementById('deriv-token-input').value;
            const adx = parseFloat(document.getElementById('adx-input').value);
            const stake = parseFloat(document.getElementById('stake-input').value);
            const btn = document.getElementById('btn-save-token');
            const err = document.getElementById('token-error');

            if (!token) { alert("Insira o Token!"); return; }

            btn.innerText = "SINCRONIZANDO...";

            // O COMANDO UPSERT QUE RESOLVE O ERRO DE CONTEXTO
            const { error } = await axiom.from('user_configs').upsert({
                id: currentUser.id,
                deriv_token: token,
                adx_minimo: adx,
                stake: stake,
                updated_at: new Date()
            });

            if (!error) {
                document.getElementById('onboarding-modal').classList.add('hidden');
                document.getElementById('val-adx').innerText = adx;
                alert("CONEXÃO ESTABELECIDA! Pés no mármore.");
            } else {
                err.innerText = "Erro ao salvar: " + error.message;
                err.classList.remove('hidden');
            }
            btn.innerText = "Sincronizar com Motor";
        }

        async function logout() {
            await axiom.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
