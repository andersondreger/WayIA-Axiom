<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayIA | Axioma Sentinel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #E50914; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* LADO ESQUERDO - VISUAL */
        .side-visual { 
            flex: 1.2; 
            background: url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=2000') no-repeat center center;
            background-size: cover; 
            position: relative; 
            display: flex; 
            align-items: flex-end; 
            padding: 60px;
        }
        .side-visual::after { 
            content: ""; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent); 
        }
        .visual-content { position: relative; z-index: 2; }
        .visual-content h1 { font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .visual-content p { font-size: 1.2rem; opacity: 0.7; margin-top: 15px; max-width: 400px; }

        /* LADO DIREITO - LOGIN */
        .side-auth { 
            flex: 0.8; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 40px 60px; 
            border-left: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        .auth-box { width: 100%; max-width: 350px; margin: 0 auto; }
        .logo { font-weight: 900; color: var(--primary); letter-spacing: 4px; font-size: 1.4rem; margin-bottom: 40px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #666; margin-bottom: 8px; letter-spacing: 2px; }
        input, select { 
            width: 100%; padding: 14px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; border-radius: 4px; font-size: 0.95rem; transition: 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1); }
        select option { background: #111; color: #fff; }

        .btn-action { 
            width: 100%; padding: 16px; background: var(--primary); border: none; color: #fff;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            border-radius: 4px; margin-top: 10px; transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4); }

        .auth-links { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .auth-links a { color: #888; font-size: 0.85rem; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .auth-links a:hover { color: #fff; text-decoration: underline; }
        .auth-links a.highlight { color: var(--primary); font-weight: bold; text-decoration: none; }

        .hidden { display: none; }

        @media (max-width: 1000px) { .side-visual { display: none; } .side-auth { flex: 1; } }
    </style>
</head>
<body>

    <div class="side-visual">
        <div class="visual-content">
            <h1>WayIA <span style="color:var(--primary)">Axiom</span></h1>
            <p>O Sentinel está operando. Conecte sua conta para gerenciar as frequências de volatilidade.</p>
        </div>
    </div>

    <div class="side-auth">
        <div class="auth-box">
            <div class="logo">SENTINEL ACCESS</div>
            
            <!-- FORMULÁRIO DE LOGIN -->
            <div id="login-form">
                <div class="input-group">
                    <label>E-mail do Operador</label>
                    <input type="email" id="login-email" placeholder="nome@exemplo.com">
                </div>
                <div class="input-group">
                    <label>Senha de Segurança</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                
                <button class="btn-action" onclick="handleLogin()">Acessar Sistema</button>
                
                <div class="auth-links">
                    <a onclick="handleResetPassword()">Recuperar senha</a>
                    <a class="highlight" onclick="toggleView('signup')">Cadastre-se agora</a>
                </div>
            </div>

            <!-- FORMULÁRIO DE CADASTRO -->
            <div id="signup-form" class="hidden">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="signup-nome" placeholder="Seu nome">
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="signup-email" placeholder="nome@exemplo.com">
                </div>
                <div class="input-group">
                    <label>Telefone</label>
                    <input type="tel" id="signup-telefone" placeholder="(11) 99999-9999">
                </div>
                <div class="input-group">
                    <label>Você é investidor?</label>
                    <select id="signup-investidor">
                        <option value="sim">Sim, já invisto</option>
                        <option value="nao">Não, estou começando</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Senha de Segurança</label>
                    <input type="password" id="signup-password" placeholder="Mínimo 6 caracteres">
                </div>

                <button class="btn-action" onclick="handleSignup()">Criar Conta</button>
                
                <div class="auth-links">
                    <a onclick="toggleView('login')">Já tenho uma conta? Entrar</a>
                </div>
            </div>

            <p style="margin-top: 30px; font-size: 0.8rem; color: #444; text-align: center;">
                Protegido por Criptografia Sentinel v5.2
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://xzlotpwqpdjwzqerdyfb.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_hui-V5sstG9eGU6HXo737g_KxnwE4ds";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Alterna entre a visualização de login e cadastro
        function toggleView(view) {
            if (view === 'signup') {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('signup-form').classList.remove('hidden');
            } else {
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) return alert("Preencha e-mail e senha.");

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert("Erro no login: " + error.message);
            } else {
                alert("Acesso autorizado!");
                window.location.href = "dashboard.html"; 
            }
        }

        async function handleSignup() {
            const nome = document.getElementById('signup-nome').value;
            const email = document.getElementById('signup-email').value;
            const telefone = document.getElementById('signup-telefone').value;
            const isInvestidor = document.getElementById('signup-investidor').value === 'sim';
            const password = document.getElementById('signup-password').value;

            if (!nome || !email || !telefone || !password) {
                return alert("Preencha todos os campos do cadastro.");
            }

            const { data, error } = await _supabase.auth.signUp({ 
                email, 
                password,
                options: {
                    data: {
                        nome: nome,
                        telefone: telefone,
                        investidor: isInvestidor
                    }
                }
            });

            if (error) {
                alert("Erro no cadastro: " + error.message);
            } else {
                alert("Cadastro realizado com sucesso! Pode ser necessário verificar seu e-mail.");
                toggleView('login');
            }
        }

        async function handleResetPassword() {
            const email = document.getElementById('login-email').value;
            if (!email) {
                return alert("Por favor, digite seu e-mail no campo acima e clique em 'Recuperar senha' novamente.");
            }

            const { data, error } = await _supabase.auth.resetPasswordForEmail(email);
            if (error) {
                alert("Erro ao tentar recuperar a senha: " + error.message);
            } else {
                alert("Um link de recuperação foi enviado para: " + email);
            }
        }
    </script>
</body>
</html>
