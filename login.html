<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WayIA | Axioma Sentinel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #E50914; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* LADO ESQUERDO - VISUAL */
        .side-visual { 
            flex: 1.2; 
            background: url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=2000') no-repeat center center;
            background-size: cover; 
            position: relative; 
            display: flex; 
            align-items: flex-end; 
            padding: 60px;
        }
        .side-visual::after { 
            content: ""; position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent); 
        }
        .visual-content { position: relative; z-index: 2; }
        .visual-content h1 { font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .visual-content p { font-size: 1.2rem; opacity: 0.7; margin-top: 15px; max-width: 400px; }

        /* LADO DIREITO - LOGIN */
        .side-auth { 
            flex: 0.8; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 60px; 
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .auth-box { width: 100%; max-width: 350px; margin: 0 auto; }
        .logo { font-weight: 900; color: var(--primary); letter-spacing: 4px; font-size: 1.4rem; margin-bottom: 50px; }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #666; margin-bottom: 8px; letter-spacing: 2px; }
        input { 
            width: 100%; padding: 16px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; border-radius: 4px; font-size: 1rem; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .btn-action { 
            width: 100%; padding: 18px; background: var(--primary); border: none; color: #fff;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            border-radius: 4px; margin-top: 10px; transition: 0.3s;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.4); }
        .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-top: 15px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        @media (max-width: 1000px) { .side-visual { display: none; } .side-auth { flex: 1; } }
    </style>
</head>
<body>

    <div class="side-visual">
        <div class="visual-content">
            <h1>WayIA <span style="color:var(--primary)">Axiom</span></h1>
            <p>O Sentinel está operando. Conecte sua conta para gerenciar as frequências de volatilidade.</p>
        </div>
    </div>

    <div class="side-auth">
        <div class="auth-box">
            <div class="logo">SENTINEL ACCESS</div>
            
            <div class="input-group">
                <label>E-mail do Operador</label>
                <input type="email" id="email" placeholder="nome@exemplo.com">
            </div>

            <div class="input-group">
                <label>Senha de Segurança</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn-action" onclick="handleAuth('login')">Acessar Sistema</button>
            <button class="btn-action btn-secondary" onclick="handleAuth('signup')">Criar Nova Conta</button>

            <p style="margin-top: 30px; font-size: 0.8rem; color: #444; text-align: center;">
                Protegido por Criptografia Sentinel v5.2
            </p>
        </div>
    </div>

    <script>
        // DADOS REAIS DO SEU SUPABASE (CONFORME SUAS FOTOS)
        const SUPABASE_URL = "https://xzlotpwqpdjwzqerdyfb.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_hui-V5sstG9eGU6HXo737g_KxnwE4ds";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) return alert("Preencha todos os campos.");

            if (type === 'signup') {
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if (error) alert("Erro no cadastro: " + error.message);
                else alert("Cadastro realizado! Verifique seu e-mail para confirmar.");
            } else {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Erro no login: " + error.message);
                else {
                    alert("Acesso autorizado!");
                    window.location.href = "dashboard.html"; 
                }
            }
        }
    </script>
</body>
</html>
